target-version = "py312"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "T20",  # flake8-print
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # Depends() in defaults — standard FastAPI pattern
]

[lint.per-file-ignores]
"api/tests/*.py" = ["E402"]
"api/alembic/*.py" = ["E402"]

[lint.isort]
known-first-party = ["api", "rbm"]
